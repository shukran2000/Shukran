<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صدقة جارية</title>

<meta property="og:title" content="استغفار إلى روح ام ازهر">
<meta property="og:image" content="https://i.imgur.com/a3Wv0QQ.jpeg">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Arial;
  height:100svh;
  display:flex;
  justify-content:center;
  align-items:center;
  background-image: url('https://i.imgur.com/a3Wv0QQ.jpeg');
  background-size: cover;
  background-position: center;
}

/* تغميق الخلفية */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.25);
}

/* البوكس الخارجي */
.card{
  width:92%;
  max-width:400px;
  background:#f7f7f9;
  border-radius:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  text-align:center;
  position:relative;
  z-index:1;
  padding:20px;
}

/* العنوان */
.title{
  font-size:22px;
  font-weight:bold;
  color:#111;
}

.name{
  margin-top:6px;
  color:#666;
  font-size:14px;
}

/* شكل العداد (مثل الجهاز بالصورة) */
.counter-box{
  margin:20px auto;
  width:180px;
  height:230px;
  background:#eeeeef;
  border-radius:90px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  box-shadow: inset 0 5px 15px rgba(0,0,0,0.1);
}

/* شاشة الرقم */
.screen{
  width:120px;
  height:55px;
  background:white;
  border-radius:12px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:40px;
  font-weight:bold;
  margin-bottom:20px;
}

/* الأزرار */
.btns{
  display:flex;
  gap:10px;
}

.btn{
  width:55px;
  height:55px;
  border-radius:14px;
  border:none;
  font-size:24px;
  background:white;
  box-shadow:0 3px 8px rgba(0,0,0,0.15);
  cursor:pointer;
}

.btn:active{
  transform:scale(0.9);
}

/* الذكر */
.zikr{
  margin-top:15px;
  color:#1e8f3e;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

  <div class="title">صدقة جارية</div>
  <div class="name">استغفار إلى روح المرحومة ام ازهر</div>

  <div class="counter-box">

    <div class="screen" id="count">0</div>

    <div class="btns">
      <button class="btn" onclick="countUp()">+</button>
      <button class="btn" onclick="resetCount()">↺</button>
    </div>

    <div class="zikr">استغفر الله</div>

  </div>

</div>

<script>
let count = 0;

function countUp(){
  if(count < 100){
    count++;
    document.getElementById("count").innerText = count;
  }
}

function resetCount(){
  count = 0;
  document.getElementById("count").innerText = count;
}
</script>

</body>
</html>
