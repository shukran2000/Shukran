<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صدقة جارية</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Arial;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  overflow:hidden;
}

/* الخلفية */
body{
  background-image: url('https://i.imgur.com/a3Wv0QQ.jpeg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* طبقة تغميق حتى تكون أوضح */
body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.35);
  z-index:0;
}

/* الكرت */
.card{
  width:95%;
  max-width:450px;
  background: rgba(255,255,255,0.9);
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
  text-align:center;
  position:relative;
  z-index:1;
}

.box{
  padding:20px;
}

.title{
  font-size:24px;
  font-weight:bold;
}

.name{
  color:gray;
  margin:10px 0;
  font-size:18px;
}

.counter{
  font-size:70px;
  margin:20px 0;
  font-weight:bold;
}

/* الأزرار */
button{
  padding:18px 30px;
  margin:8px;
  border:none;
  border-radius:12px;
  font-size:26px;
  cursor:pointer;
  background:#e0e0e0;
}

button:active{
  transform:scale(0.95);
}

.zikr{
  margin-top:15px;
  color:green;
  font-size:18px;
}
</style>

</head>

<body>

<div class="card">

  <div class="box">
    <div class="title">صدقة جارية</div>

    <div class="name">استغفار إلى روح المرحومة ميعاد ابراهيم</div>

    <div class="counter" id="count">0</div>

    <button onclick="countUp()">+</button>
    <button onclick="resetCount()">↺</button>

    <div class="zikr">استغفر الله</div>
  </div>

</div>

<script>
let count = 0;

function countUp(){
  if(count < 100){
    count++;
    document.getElementById("count").innerText = count;
  }
}

function resetCount(){
  count = 0;
  document.getElementById("count").innerText = count;
}
</script>

</body>
</html>
