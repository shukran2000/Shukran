<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>صدقة جارية</title>

<!-- 🔥 Social preview (عند مشاركة الرابط) -->
<meta property="og:title" content="صدقة جارية">
<meta property="og:description" content="استغفار إلى روح المرحومة ميعاد ابراهيم">
<meta property="og:image" content="https://raw.githubusercontent.com/shukran2000/Shukran/refs/heads/main/تصميم%20بدون%20عنوان.jpeg
<meta property="og:type" content="website">
<meta property="og:url" content="https://shukran2000.github.io/Shukran/">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Arial;
  background:#f2f2f2;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* الكرت */
.card{
  background:white;
  width:95%;
  max-width:450px;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 0 20px rgba(0,0,0,0.25);
  text-align:center;
}

/* الصورة */
.card img{
  width:100%;
  display:block;
}

/* المحتوى */
.box{
  padding:20px;
}

.title{
  font-size:24px;
  font-weight:bold;
}

.name{
  color:gray;
  margin:10px 0;
  font-size:18px;
}

.counter{
  font-size:70px;
  margin:20px 0;
  font-weight:bold;
}

/* الأزرار */
button{
  padding:20px 35px;
  margin:10px;
  border:none;
  border-radius:15px;
  font-size:28px;
  cursor:pointer;
  background:#e0e0e0;
}

button:active{
  transform:scale(0.95);
}

.zikr{
  margin-top:15px;
  color:green;
  font-size:18px;
}
</style>

</head>

<body>

<div class="card">

  <img src="https://i.imgur.com/tUfhLCN.jpeg">

  <div class="box">
    <div class="title">صدقة جارية</div>

    <div class="name">استغفار إلى روح المرحومة ميعاد ابراهيم</div>

    <div class="counter" id="count">0</div>

    <button onclick="countUp()">+</button>
    <button onclick="resetCount()">↺</button>

    <div class="zikr">استغفر الله</div>
  </div>

</div>

<script>
let count = 0;

function countUp(){
  if(count < 100){
    count++;
    document.getElementById("count").innerText = count;
  }
}

function resetCount(){
  count = 0;
  document.getElementById("count").innerText = count;
}
</script>

</body>
</html>
