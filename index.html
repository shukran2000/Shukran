<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صدقة جارية</title>

<!-- 👇 هذا المهم للمشاركة -->
<meta property="og:title" content="استغفار إلى روح ميعاد ابراهيم">
<meta property="og:description" content="صدقة جارية - استغفر الله">
<meta property="og:image" content="https://i.imgur.com/a3Wv0QQ.jpeg">
<meta property="og:type" content="website">
<meta property="og:url" content="https://shukran2000.github.io/Shukran/">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body{
  overflow:hidden;
}

body{
  font-family: Arial;
  height:100svh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;

  background-image: url('https://i.imgur.com/a3Wv0QQ.jpeg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* تغميق */
body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.35);
}

/* الكرت */
.card{
  width:92%;
  max-width:400px;
  background: rgba(255,255,255,0.9);
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
  text-align:center;
  position:relative;
  z-index:1;
}

/* المحتوى */
.box{
  padding:15px;
}

.title{
  font-size:20px;
  font-weight:bold;
}

.name{
  color:gray;
  margin:6px 0;
  font-size:15px;
}

.counter{
  font-size:55px;
  margin:10px 0;
  font-weight:bold;
}

/* الأزرار */
button{
  padding:14px 20px;
  margin:6px;
  border:none;
  border-radius:10px;
  font-size:22px;
  cursor:pointer;
  background:#e0e0e0;
}

button:active{
  transform:scale(0.95);
}

.zikr{
  margin-top:10px;
  color:green;
  font-size:16px;
}
</style>

</head>

<body>

<div class="card">

  <div class="box">
    <div class="title">صدقة جارية</div>

    <div class="name">استغفار إلى روح المرحومة ميعاد ابراهيم</div>

    <div class="counter" id="count">0</div>

    <button onclick="countUp()">+</button>
    <button onclick="resetCount()">↺</button>

    <div class="zikr">استغفر الله</div>
  </div>

</div>

<script>
let count = 0;

function countUp(){
  if(count < 100){
    count++;
    document.getElementById("count").innerText = count;
  }
}

function resetCount(){
  count = 0;
  document.getElementById("count").innerText = count;
}
</script>

</body>
</html>
