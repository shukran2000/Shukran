<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صدقة جارية</title>

<meta property="og:title" content="استغفار إلى روح ام ازهر">
<meta property="og:image" content="https://i.imgur.com/a3Wv0QQ.jpeg">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body{
  overflow:hidden;
}

body{
  font-family: Arial;
  height:100svh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;

  background-image: url('https://i.imgur.com/a3Wv0QQ.jpeg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* تغميق خفيف للخلفية */
body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.25);
}

/* البوكس الزجاجي */
.card{
  width:92%;
  max-width:400px;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-radius:20px;
  box-shadow:0 10px 35px rgba(0,0,0,0.25);
  text-align:center;
  position:relative;
  z-index:1;
  border:1px solid rgba(255,255,255,0.5);
}

/* المحتوى */
.box{
  padding:20px;
}

.title{
  font-size:22px;
  font-weight:bold;
  color:#1e2a78;
}

.name{
  color:#1e2a78;
  margin:8px 0;
  font-size:16px;
  font-weight:bold;
}

.counter{
  font-size:60px;
  margin:10px 0;
  font-weight:bold;
  color:#000;
}

button{
  padding:14px 22px;
  margin:6px;
  border:none;
  border-radius:12px;
  font-size:22px;
  cursor:pointer;
  background:#1e2a78;
  color:white;
}

button:active{
  transform:scale(0.95);
}

.zikr{
  margin-top:10px;
  color:#1e2a78;
  font-size:17px;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="card">

  <div class="box">
    <div class="title">صدقة جارية</div>

    <div class="name">
      استغفار إلى روح المرحومة ام ازهر
    </div>

    <div class="counter" id="count">0</div>

    <button onclick="countUp()">+</button>
    <button onclick="resetCount()">↺</button>

    <div class="zikr">استغفر الله واتوب اليه</div>
  </div>

</div>

<script>
let count = 0;

function countUp(){
  if(count < 100){
    count++;
    document.getElementById("count").innerText = count;
  }
}

function resetCount(){
  count = 0;
  document.getElementById("count").innerText = count;
}
</script>

</body>
</html>
